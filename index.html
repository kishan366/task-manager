<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
 <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <h1>Task Dashboard</h1>
      <p>Track, manage, and filter your daily objectives.</p>
    </header>

    <div class="dashboard-grid">
      
      <div class="controls-card">
        <h2>Create Task</h2>
        <form id="task-form">
          <div class="form-group">
            <label>Task Description</label>
            <input type="text" id="task-input" placeholder="What needs to be done?" required>
          </div>
          
          <div class="form-group">
            <label>Category</label>
            <select id="category-select">
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Urgent">Urgent</option>
            </select>
          </div>
          
          <button type="submit" class="btn btn-primary">Add Task</button>
        </form>

        <div class="divider"></div>

        <button id="clear-all-btn" class="btn btn-danger">Clear All Tasks</button>
      </div>

      <div class="list-card">
        <div class="list-header">
          <h2>Your Tasks</h2>
          <div class="metrics-badges">
            <span class="badge badge-pending">Pending: <span id="pending-count">0</span></span>
            <span class="badge badge-completed">Completed: <span id="completed-count">0</span></span>
          </div>
        </div>

        <div class="task-list-wrapper">
          <ul id="task-list" class="task-list"></ul>
          <div id="empty-state" class="empty-state">
            <p>No tasks found. Add some above!</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
